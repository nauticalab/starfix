name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.3.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # A GitHub App token is required here even though cargo-release only writes
      # to this same repository. GitHub's recursion guard prevents GITHUB_TOKEN-
      # authenticated pushes from triggering other workflow runs — so a tag pushed
      # with GITHUB_TOKEN would NOT fire maturin-release.yml. A GitHub App token
      # bypasses that guard, allowing the v* tag push to trigger wheel builds and
      # PyPI publication in maturin-release.yml.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: 1.91.1

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        run: cargo release ${{ inputs.version }} --execute --no-confirm
