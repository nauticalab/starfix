name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.3.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # cargo-release commits + pushes
      id-token: write   # crates.io trusted publishing (OIDC — no API token needed)
    steps:
      # A GitHub App token is required here even though cargo-release only writes
      # to this same repository. GitHub's recursion guard prevents GITHUB_TOKEN-
      # authenticated pushes from triggering other workflow runs — so a tag pushed
      # with GITHUB_TOKEN would NOT fire ci.yml. A GitHub App token bypasses that
      # guard, allowing the v* tag push to trigger the CI verify-version-tag-sync
      # check in ci.yml.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: 1.91.1

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # cargo-release bumps Cargo.toml, commits "chore: release v<version>",
      # creates the v<version> tag, and pushes both to the repo.
      # Publishing is disabled in release.toml (publish = false) because
      # cargo-release checks for a registry token before calling `cargo publish`,
      # which prevents the OIDC exchange from ever running. Publishing is handled
      # by the separate step below.
      - name: Release (version bump, commit, tag, push)
        run: cargo release ${{ inputs.version }} --execute --no-confirm

      # `cargo publish` natively supports crates.io trusted publishing via OIDC
      # when id-token: write is granted. No CARGO_REGISTRY_TOKEN secret needed.
      - name: Publish to crates.io
        run: cargo publish
