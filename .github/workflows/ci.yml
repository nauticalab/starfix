name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  verify-version-tag-sync:
    runs-on: ubuntu-latest
    # No job-level if: — always runs so downstream jobs are not skipped on workflow_dispatch.
    # The actual version check is gated to tag pushes at the step level.
    steps:
      - if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Verify Cargo.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag v${TAG} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi
          echo "OK: Tag v${TAG} matches Cargo.toml version ${CARGO_VERSION}"
