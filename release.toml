# cargo-release configuration for nauticalab/starfix.
#
# Usage:
#   cargo release <version> --execute --no-confirm
#
# cargo-release atomically: bumps Cargo.toml, commits, creates the v<version>
# git tag, pushes both the commit and tag, then publishes to crates.io.
# The tag push triggers ci.yml which runs tests and verifies version/tag sync.
#
# Publishing uses crates.io trusted publishing (OIDC — no API token secret
# needed). release.yml exchanges the GitHub OIDC JWT for a short-lived crates.io
# API token and sets CARGO_REGISTRY_TOKEN before invoking cargo-release, so
# cargo-release's pre-publish token check passes and publish = true works.
#
# The Python package "starfix" is a separate project released exclusively
# through nauticalab/starfix-python.
pre-release-commit-message = "chore: release v{{version}}"
tag-name                   = "v{{version}}"
push                       = true
publish                    = true
